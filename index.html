<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandbox App</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;
    max-width:800px;
    background:#111827;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    color:#22c55e;
}

.terminal{
    background:black;
    padding:15px;
    border-radius:6px;
    font-family:monospace;
    height:250px;
    overflow:auto;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    background:#1f2937;
    color:white;
}

button{
    margin-top:10px;
    padding:10px;
    width:100%;
    background:#22c55e;
    border:none;
    border-radius:5px;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#16a34a;
}
</style>
</head>

<body>

<div class="container">
<h1>Sandbox Terminal</h1>

<div class="terminal" id="output">
Welcome to Sandbox Server
</div>

<input type="text" id="command" placeholder="Type command...">

<button onclick="runCommand()">Run</button>

</div>

<script>

function runCommand(){

let cmd=document.getElementById("command").value;
let output=document.getElementById("output");

output.innerHTML += "<br>> " + cmd;

document.getElementById("command").value="";

}

</script>

</body>
</html>
